version: '3.8'

services:
  app:
    image: miller11k/agentic-figure-drawer:latest
    build:
      context: .
      # args:
    network_mode: host
    env_file:
        - .env
    container_name: agentic-figure-editor
    ports:
      - "5080:5080"   # Frontend
      - "9988:9988"   # API
    environment:
      API_PORT: 9988
      NODE_ENV: production
    restart: always