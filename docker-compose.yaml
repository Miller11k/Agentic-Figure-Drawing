services:
  comfyui:
    build:
      context: .
      dockerfile: docker/comfyui/Dockerfile
    image: agentic-figure-drawing-comfyui:latest
    container_name: agentic-figure-drawing-comfyui
    ports:
      - "8188:8188"
    gpus: all
    volumes:
      - ./ComfyUI/models:/opt/ComfyUI/models
      - ./ComfyUI/input:/opt/ComfyUI/input
      - ./ComfyUI/output:/opt/ComfyUI/output
      - ./ComfyUI/custom_nodes:/opt/ComfyUI/custom_nodes
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8188/system_stats > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  app:
    build:
      context: .
    image: agentic-figure-drawing:latest
    container_name: agentic-figure-drawing
    depends_on:
      comfyui:
        condition: service_healthy
    ports:
      - "5080:5080"
      - "9988:9988"
    environment:
      API_PORT: 9988
      NODE_ENV: production
      SERVER_URL: http://comfyui:8188
      MODEL: ${MODEL:-sd_xl_base_1.0.safetensors}
      MODEL_TEXT_TO_IMAGE: ${MODEL_TEXT_TO_IMAGE:-}
      MODEL_IMAGE_EDIT: ${MODEL_IMAGE_EDIT:-}
      MODEL_DIAGRAM_CLEANUP: ${MODEL_DIAGRAM_CLEANUP:-}
      MODEL_ASSET_REFINE: ${MODEL_ASSET_REFINE:-}
      WORKFLOW_PROFILE_TEXT_TO_IMAGE: ${WORKFLOW_PROFILE_TEXT_TO_IMAGE:-}
      WORKFLOW_PROFILE_IMAGE_EDIT: ${WORKFLOW_PROFILE_IMAGE_EDIT:-}
      WORKFLOW_PROFILE_DIAGRAM_CLEANUP: ${WORKFLOW_PROFILE_DIAGRAM_CLEANUP:-}
      WORKFLOW_PROFILE_ASSET_REFINE: ${WORKFLOW_PROFILE_ASSET_REFINE:-}
      WORKFLOW_TEMPLATE_TEXT_TO_IMAGE_SD35: ${WORKFLOW_TEMPLATE_TEXT_TO_IMAGE_SD35:-}
      WORKFLOW_TEMPLATE_IMAGE_EDIT_SD35: ${WORKFLOW_TEMPLATE_IMAGE_EDIT_SD35:-}
      WORKFLOW_TEMPLATE_TEXT_TO_IMAGE_FLUX: ${WORKFLOW_TEMPLATE_TEXT_TO_IMAGE_FLUX:-}
      WORKFLOW_TEMPLATE_IMAGE_EDIT_FLUX: ${WORKFLOW_TEMPLATE_IMAGE_EDIT_FLUX:-}
      WORKFLOW_TEMPLATE_IMAGE_EDIT_FLUX_KONTEXT: ${WORKFLOW_TEMPLATE_IMAGE_EDIT_FLUX_KONTEXT:-}
      WORKFLOW_TEMPLATE_TEXT_TO_IMAGE_QWEN_IMAGE: ${WORKFLOW_TEMPLATE_TEXT_TO_IMAGE_QWEN_IMAGE:-}
      WORKFLOW_TEMPLATE_IMAGE_EDIT_QWEN_IMAGE: ${WORKFLOW_TEMPLATE_IMAGE_EDIT_QWEN_IMAGE:-}
      WORKFLOW_TEMPLATE_IMAGE_EDIT_QWEN_IMAGE_EDIT: ${WORKFLOW_TEMPLATE_IMAGE_EDIT_QWEN_IMAGE_EDIT:-}
      WORKFLOW_TEMPLATE_IMAGE_EDIT_QWEN_IMAGE_EDIT_GGUF: ${WORKFLOW_TEMPLATE_IMAGE_EDIT_QWEN_IMAGE_EDIT_GGUF:-}
      QWEN_CLIP_MODEL: ${QWEN_CLIP_MODEL:-qwen_2.5_vl_7b_fp8_scaled.safetensors}
      QWEN_VAE_MODEL: ${QWEN_VAE_MODEL:-qwen_image_vae.safetensors}
      QWEN_GGUF_CLIP_MODEL: ${QWEN_GGUF_CLIP_MODEL:-Qwen2.5-VL-7B-Instruct-Q2_K.gguf}
      QWEN_GGUF_VAE_MODEL: ${QWEN_GGUF_VAE_MODEL:-Qwen_Image-VAE.safetensors}
      ALLOWED_ORIGINS: http://127.0.0.1:5080,http://localhost:5080,http://127.0.0.1:9988,http://localhost:9988
    volumes:
      - ./Backend/data:/app/Backend/data
    restart: unless-stopped
