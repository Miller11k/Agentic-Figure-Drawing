services:
  app:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/data/dev.db
      ARTIFACT_STORAGE_ROOT: /app/public/artifacts
      NEXT_DIST_DIR: .next-build
    volumes:
      - app_data:/app/data
      - app_artifacts:/app/public/artifacts
    restart: unless-stopped

  dev:
    image: node:20-bookworm-slim
    working_dir: /app
    profiles:
      - dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: file:/app/data/dev.db
      ARTIFACT_STORAGE_ROOT: /app/public/artifacts
      NEXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
      - app_data:/app/data
      - app_artifacts:/app/public/artifacts
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends openssl ca-certificates && npm install && npx prisma generate && npx prisma migrate deploy && npm run dev -- --hostname 0.0.0.0"

volumes:
  app_data:
  app_artifacts:
  dev_node_modules:
