<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag & Drop Uploader</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://viewer.diagrams.net/js/viewer-static.min.js"></script>
</head>
<body>

    <div class="upload-container">
        <h2 style="margin-top: 0; font-size: 1.25rem; font-weight: 700; letter-spacing: -0.025em;">Uploader</h2>

        
        <div id="drop-zone-wrapper">
            <div id="drop-zone" class="drop-zone">
                <div id="prompt-text" style="text-align:center">
                    <svg style="width: 32px; height: 32px; margin-bottom: 8px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <p style="margin:0; font-size: 0.9rem;">Drop image or click to browse</p>
                </div>
                <img id="preview-img" src="" alt="Preview" style="display:none;">
                <div id="drawio-container" style="display:none; width: 100%; height: 100%;"></div>
            </div>
        </div>

        <!-- <br/> -->
       
        <div class="mode-selector">
            <button id="mode-image" class="mode-btn active">Prompt + Image</button>
            <button id="mode-prompt" class="mode-btn">Prompt Only</button>
        </div>
        
        <textarea id="user-description" placeholder="Type your notes here..."></textarea>
        
        <div id="error-message" class="error-text"></div>
        <input type="file" id="file-input" accept="image/*,.drawio" hidden>

        <div class="button-group">
            <button id="restart-btn" class="btn-restart hidden">Remove</button>
            <button id="submit-btn" class="btn-submit">Submit Request</button>
        </div>
    </div>

    <script src="https://viewer.diagrams.net/js/viewer-static.min.js"></script>

    <script src="script.js"></script>
</body>
</html>
